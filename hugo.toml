baseURL = "https://jamylee6666.github.io/ai-auto-blog/"
languageCode = "en-us"
title = "AI Tools & Side Hustle Guide"
theme = "hugo-theme-stack"
googleAnalytics = "G-CDVT3JC907"
enableRobotsTXT = true

[params]
  description = "Discover the best AI tools, tutorials, and side hustle strategies to boost your productivity and income."
  author = "AI Tools Guide"
  mainSections = ["posts"]

  # Google AdSense ID - 申請通過後填入
  adsenseId = ""
  # Google Analytics ID - 選填
  googleAnalytics = "G-CDVT3JC907"

  [params.footer]
    since = 2026
    customText = ""

  [params.dateFormat]
    published = "Jan 02, 2006"
    lastUpdated = "Jan 02, 2006"

  [params.sidebar]
    compact = false
    avatar = ""
    subtitle = "Discover the best AI tools, tutorials, and side hustle strategies."

  [params.article]
    headingAnchor = true
    toc = true
    readingTime = true

    [params.article.license]
      enabled = false

  [params.widgets]
    homepage = [
      { type = "archives", params = { limit = 5 } },
      { type = "categories", params = { limit = 10 } },
      { type = "tag-cloud", params = { limit = 30 } },
    ]
    page = [
      { type = "categories", params = { limit = 10 } },
      { type = "tag-cloud", params = { limit = 30 } },
    ]

  [params.colorScheme]
    toggle = true
    default = "light"

  [params.comments]
    enabled = false

[markup]
  [markup.highlight]
    style = "monochrome"
    noClasses = false
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[taxonomies]
  tag = "tags"
  category = "categories"

[outputs]
  home = ["HTML", "RSS"]

[sitemap]
  changefreq = "daily"
  priority = 0.5

[related]
  threshold = 80
  toLower = false
  [[related.indices]]
    name = "tags"
    weight = 100
  [[related.indices]]
    name = "categories"
    weight = 80
  [[related.indices]]
    name = "date"
    weight = 10

[[menu.main]]
  name = "Home"
  url = "/"
  weight = 1
  [menu.main.params]
    icon = "home"

[[menu.main]]
  name = "AI Tools"
  url = "/categories/ai-tools/"
  weight = 2
  [menu.main.params]
    icon = "tag"

[[menu.main]]
  name = "Side Hustle"
  url = "/categories/side-hustle/"
  weight = 3
  [menu.main.params]
    icon = "hash"

[[menu.main]]
  name = "Tutorials"
  url = "/categories/tutorials/"
  weight = 4
  [menu.main.params]
    icon = "categories"
